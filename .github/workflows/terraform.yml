name: Terraform Azure Deployment - AppSec 103-203 Env Build

on:
  workflow_dispatch:
    inputs:
      RunName:
        description: 'This will be used for the state file naming. When deploying multiple environments for an event perform multiple deployments with different RunNames to avoid state file conflicts. For example, use your initials followed by a number (e.g. jdoe1) and increment the number for each additional deployment.'
        required: true
        default: ''
        type: string
      UserCount:
        description: 'Number of users and environments to deploy (1-8), max 8 per run. A count of 0 will destroy all users and environments. When removing ensure the run name is the same as the deployment run name to be removed (e.g. jdoe1) to ensure the correct state file is used for the destroy operation.'
        required: true
        default: '0'
        type: string
      UserStart:
        description: 'Starting index for user numbering. When combining with a previous deployment, ensure the starting index does not overlap with existing users. For example, if a previous deployment used a user count of 4 starting at index 10, the next deployment could start at index 14 to avoid overlap.'
        required: false
        default: '10'
        type: string
jobs:
  ENV_BUILD:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: ENV Build Values
        run: |

          echo "RunName:               ${{ github.event.inputs.RunName }}"  
          echo "user_count:            ${{ github.event.inputs.UserCount }}"
          echo "user_start:            ${{ github.event.inputs.UserStart }}"
          echo "username_prefix:       ${{ vars.ENV_USERNAME_PREFIX }}"
          echo "rg_suffix:             ${{ vars.ENV_RG_SUFFIX }}"
          echo "location:              ${{ vars.ENV_LOCATION }}"
          echo "vm_username:           ${{ vars.ENV_VM_USERNAME }}"
          echo "password:              ${{ vars.ENV_BASIC_PASSWORD }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.3

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Terraform Init
        id: init
        working-directory: ./terraform
        run: terraform init -no-color -backend-config="resource_group_name=${{ secrets.BACKEND_AZURE_RESOURCE_GROUP_NAME }}" -backend-config="storage_account_name=${{ secrets.BACKEND_AZURE_STORAGE_ACCOUNT_NAME }}" -backend-config="container_name=${{ secrets.BACKEND_AZURE_STORAGE_CONTAINER_NAME }}"  -backend-config="key=${{ github.event.inputs.RunName }}.terraform.tfstate"

      - name: Terraform Validate
        id: validate
        working-directory: ./terraform
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vm_username: ${{ vars.ENV_VM_USERNAME }}
          TF_VAR_username_prefix: ${{ vars.ENV_USERNAME_PREFIX }}
          TF_VAR_user_count: ${{ github.event.inputs.UserCount }}
          TF_VAR_user_start: ${{ github.event.inputs.UserStart }}
          TF_VAR_rg_suffix: ${{ vars.ENV_RG_SUFFIX }}
          TF_VAR_location: ${{ vars.ENV_LOCATION }}
          TF_VAR_password: ${{ vars.ENV_BASIC_PASSWORD }}
          TF_VAR_fortiflexvm_config_id: ${{ secrets.FORTIFLEXVM_CONFIG_ID }}
          TF_VAR_fortiflexvm_program_serial_number: ${{ secrets.FORTIFLEXVM_PROGRAM_SERIAL_NUMBER }}
          TF_VAR_fortiflex_access_username: ${{ secrets.FORTIFLEX_ACCESS_USERNAME }}
          TF_VAR_fortiflex_access_password: ${{ secrets.FORTIFLEX_ACCESS_PASSWORD }}
          TF_VAR_fortiflex_serial_numbers: ${{ vars.ENV_FORTIFLEX_SERIAL_NUMBERS }}

      - name: Terraform Apply
        id: apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -parallelism=20 -no-color tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vm_username: ${{ vars.ENV_VM_USERNAME }}
          TF_VAR_username_prefix: ${{ vars.ENV_USERNAME_PREFIX }}
          TF_VAR_user_count: ${{ github.event.inputs.UserCount }}
          TF_VAR_user_start: ${{ github.event.inputs.UserStart }}
          TF_VAR_rg_suffix: ${{ vars.ENV_RG_SUFFIX }}
          TF_VAR_location: ${{ vars.ENV_LOCATION }}
          TF_VAR_password: ${{ vars.ENV_BASIC_PASSWORD }}
          TF_VAR_fortiflexvm_config_id: ${{ secrets.FORTIFLEXVM_CONFIG_ID }}
          TF_VAR_fortiflexvm_program_serial_number: ${{ secrets.FORTIFLEXVM_PROGRAM_SERIAL_NUMBER }}
          TF_VAR_fortiflex_access_username: ${{ secrets.FORTIFLEX_ACCESS_USERNAME }}
          TF_VAR_fortiflex_access_password: ${{ secrets.FORTIFLEX_ACCESS_PASSWORD }}
          TF_VAR_fortiflex_serial_numbers: ${{ vars.ENV_FORTIFLEX_SERIAL_NUMBERS }}

      - name: Terraform Output
        id: output
        working-directory: ./terraform
        run: terraform output bastion_shareable_link -no-color

      - name: Azure Re-Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: PowerShell - Reboot VMs in resource groups that have not been restarted yet
        uses: azure/powershell@v2
        with:
          inlineScript: |
            Start-Sleep -Seconds 60 # Wait for a minute to ensure VMs are ready
            
            Get-AzVM -ResourceGroupName ${{ vars.ENV_USERNAME_PREFIX }}??-${{ vars.ENV_RG_SUFFIX }} | ?{$_.Name -match 'FAD-Primary|FAD-Secondary' -and (-not $_.Tags.ContainsKey("FAD-RESTARTED"))} | Restart-AzVM -NoWait -Confirm:$false
            Get-AzVM -ResourceGroupName ${{ vars.ENV_USERNAME_PREFIX }}??-${{ vars.ENV_RG_SUFFIX }} | ?{$_.Name -match 'FAD-Primary|FAD-Secondary' -and (-not $_.Tags.ContainsKey("FAD-RESTARTED"))} | %{New-AzTag -ResourceId $_.Id -Tag @{"FAD-RESTARTED"="True"}}
          azPSVersion: "latest"
